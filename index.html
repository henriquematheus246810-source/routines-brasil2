<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- PWA / Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>TaskPro Premium</title>
  
  <style>
    /* ----- RESET & VARIÁVEIS ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --accent-hover: #8183f4;
      --danger: #ef4444;
      --success: #10b981;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --radius: 16px;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 70px;
    }

    /* ----- HEADER ----- */
    header {
      padding: 1.5rem 1.25rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* ----- INPUT AREA ----- */
    .input-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 1.25rem 1rem;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
    }

    .input-field {
      flex: 1 1 180px;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .input-field::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      padding: 0 1.5rem;
      color: white;
      font-size: 1.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .add-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    /* ----- LISTA DE TAREFAS ----- */
    .lista {
      flex: 1;
      padding: 0.75rem 1rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* ----- CARD PREMIUM (TAREFA) ----- */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      animation: fadeSlide 0.3s ease;
      transition: var(--transition);
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      word-break: break-word;
    }

    .card-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 12px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 30px;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .icon-btn.danger:hover {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    /* ----- TABS (NAVEGAÇÃO INFERIOR) ----- */
    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--card-border);
      padding: 8px 0;
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 4px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 40px;
      margin: 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: 500;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
    }

    .tab-btn span {
      font-size: 0.7rem;
      margin-top: 4px;
    }

    /* ----- CONFIGURAÇÕES ----- */
    .config-panel {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: 1px solid var(--card-border);
    }

    .config-panel h3 {
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .big-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .big-btn.secondary {
      background: rgba(255,255,255,0.1);
    }

    .big-btn:hover {
      filter: brightness(1.1);
    }

    .user-id {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      word-break: break-all;
    }

    /* ----- ESTADOS VAZIOS ----- */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ----- RESPONSIVIDADE EXTRA ----- */
    @media (min-width: 640px) {
      .input-area {
        padding: 1.5rem 2rem;
      }
      .tabs {
        max-width: 600px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 30px 30px 0 0;
      }
    }
  </style>
</head>
<body>

<header>✨ TaskPro Premium</header>

<div class="input-area">
  <input type="text" id="tituloInput" class="input-field" placeholder="Nova tarefa..." aria-label="Título da tarefa" autocomplete="off">
  <input type="date" id="dataInput" class="input-field" aria-label="Data da tarefa">
  <button class="add-btn" id="addBtn" aria-label="Adicionar tarefa">+</button>
</div>

<main id="listaContainer" class="lista" role="main"></main>

<nav class="tabs" role="tablist">
  <button class="tab-btn" data-tab="pendente" role="tab" aria-selected="true">📌<span>Pendentes</span></button>
  <button class="tab-btn" data-tab="feito" role="tab">✅<span>Concluídas</span></button>
  <button class="tab-btn" data-tab="arquivado" role="tab">📦<span>Arquivadas</span></button>
  <button class="tab-btn" data-tab="config" role="tab">⚙️<span>Ajustes</span></button>
</nav>

<script>
  (function(){
    "use strict";

    // ---------- CONFIGURAÇÕES ----------
    const STORAGE_USER_KEY = 'taskpro_user';
    const STORAGE_TASKS_PREFIX = 'tarefas_';

    // Elementos DOM
    const tituloInput = document.getElementById('tituloInput');
    const dataInput = document.getElementById('dataInput');
    const addBtn = document.getElementById('addBtn');
    const listaContainer = document.getElementById('listaContainer');
    const tabButtons = document.querySelectorAll('.tab-btn');

    // Estado da aplicação
    let currentUser = localStorage.getItem(STORAGE_USER_KEY);
    if (!currentUser) {
      currentUser = `user_${Math.floor(Math.random() * 1_000_000)}`;
      localStorage.setItem(STORAGE_USER_KEY, currentUser);
    }

    const getStorageKey = () => `${STORAGE_TASKS_PREFIX}${currentUser}`;
    
    let tarefas = (() => {
      try {
        const stored = localStorage.getItem(getStorageKey());
        return stored ? JSON.parse(stored) : [];
      } catch {
        return [];
      }
    })();

    let abaAtual = 'pendente';

    // ---------- FUNÇÕES AUXILIARES ----------
    function salvarTarefas() {
      localStorage.setItem(getStorageKey(), JSON.stringify(tarefas));
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function ordenarPorData(tarefasArray) {
      return [...tarefasArray].sort((a, b) => (a.data || '').localeCompare(b.data || ''));
    }

    function formatarData(dataStr) {
      if (!dataStr) return 'Sem data';
      try {
        const [ano, mes, dia] = dataStr.split('-');
        return `${dia}/${mes}/${ano}`;
      } catch {
        return dataStr;
      }
    }

    // ---------- RENDERIZAÇÃO PRINCIPAL ----------
    function render() {
      // Atualiza estado ativo das tabs
      tabButtons.forEach(btn => {
        const isActive = btn.dataset.tab === abaAtual;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', isActive);
      });

      // Se for aba de configurações, renderiza painel especial
      if (abaAtual === 'config') {
        listaContainer.innerHTML = `
          <div class="config-panel">
            <h3>⚙️ Configurações</h3>
            <button class="big-btn" id="notifBtn">🔔 Ativar Notificações</button>
            <button class="big-btn secondary" id="resetBtn">🔄 Resetar Todos os Dados</button>
            <div class="user-id">🆔 Seu ID: ${escapeHtml(currentUser)}</div>
          </div>
        `;
        document.getElementById('notifBtn').addEventListener('click', notif);
        document.getElementById('resetBtn').addEventListener('click', resetar);
        return;
      }

      // Filtra e ordena tarefas conforme aba atual
      const tarefasFiltradas = tarefas.filter(t => t.status === abaAtual);
      const tarefasOrdenadas = ordenarPorData(tarefasFiltradas);

      if (tarefasOrdenadas.length === 0) {
        const mensagens = {
          pendente: 'Nenhuma tarefa pendente. Crie uma nova! ✨',
          feito: 'Nenhuma tarefa concluída ainda.',
          arquivado: 'Nenhuma tarefa arquivada.'
        };
        listaContainer.innerHTML = `<div class="empty-state">${mensagens[abaAtual] || 'Lista vazia'}</div>`;
        return;
      }

      // Construção da lista usando createElement
      listaContainer.innerHTML = '';
      const fragment = document.createDocumentFragment();

      tarefasOrdenadas.forEach(tarefa => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = tarefa.id;

        const header = document.createElement('div');
        header.className = 'card-header';
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'card-title';
        titleSpan.textContent = tarefa.titulo;
        header.appendChild(titleSpan);

        const dateDiv = document.createElement('div');
        dateDiv.className = 'card-date';
        dateDiv.innerHTML = `📅 ${formatarData(tarefa.data)}`;
        
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'actions';

        if (tarefa.status === 'pendente') {
          const concluirBtn = document.createElement('button');
          concluirBtn.className = 'icon-btn';
          concluirBtn.innerHTML = '✔️ Concluir';
          concluirBtn.setAttribute('aria-label', 'Marcar como concluída');
          concluirBtn.addEventListener('click', () => concluir(tarefa.id));
          actionsDiv.appendChild(concluirBtn);
        }

        if (tarefa.status === 'feito') {
          const arquivarBtn = document.createElement('button');
          arquivarBtn.className = 'icon-btn';
          arquivarBtn.innerHTML = '📦 Arquivar';
          arquivarBtn.setAttribute('aria-label', 'Arquivar tarefa');
          arquivarBtn.addEventListener('click', () => arquivar(tarefa.id));
          actionsDiv.appendChild(arquivarBtn);
        }

        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn danger';
        delBtn.innerHTML = '🗑️ Excluir';
        delBtn.setAttribute('aria-label', 'Excluir tarefa');
        delBtn.addEventListener('click', () => del(tarefa.id));
        actionsDiv.appendChild(delBtn);

        card.appendChild(header);
        card.appendChild(dateDiv);
        card.appendChild(actionsDiv);
        fragment.appendChild(card);
      });

      listaContainer.appendChild(fragment);
    }

    // ---------- CRUD & NAVEGAÇÃO ----------
    function add() {
      const titulo = tituloInput.value.trim();
      const data = dataInput.value;

      if (!titulo) {
        tituloInput.style.borderColor = '#ef4444';
        tituloInput.focus();
        setTimeout(() => tituloInput.style.borderColor = '', 800);
        return;
      }
      if (!data) {
        dataInput.style.borderColor = '#ef4444';
        dataInput.focus();
        setTimeout(() => dataInput.style.borderColor = '', 800);
        return;
      }

      const novaTarefa = {
        id: Date.now(),
        titulo: titulo,
        data: data,
        status: 'pendente'
      };

      tarefas.push(novaTarefa);
      salvarTarefas();

      tituloInput.value = '';
      dataInput.value = '';
      tituloInput.style.borderColor = '';
      dataInput.style.borderColor = '';

      render();
    }

    function mudarAba(novaAba) {
      if (abaAtual === novaAba) return;
      abaAtual = novaAba;
      render();
    }

    function concluir(id) {
      const tarefa = tarefas.find(t => t.id === id);
      if (tarefa) {
        tarefa.status = 'feito';
        salvarTarefas();
        render();
      }
    }

    function arquivar(id) {
      const tarefa = tarefas.find(t => t.id === id);
      if (tarefa) {
        tarefa.status = 'arquivado';
        salvarTarefas();
        render();
      }
    }

    function del(id) {
      tarefas = tarefas.filter(t => t.id !== id);
      salvarTarefas();
      render();
    }

    // ---------- NOTIFICAÇÕES ----------
    function notif() {
      if (!('Notification' in window)) {
        alert('Seu navegador não suporta notificações.');
        return;
      }
      if (Notification.permission === 'granted') {
        alert('Notificações já estão ativadas!');
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            new Notification('TaskPro Premium', { body: 'Notificações ativadas com sucesso! 🎉' });
          }
        });
      } else {
        alert('Permissão negada. Habilite nas configurações do navegador.');
      }
    }

    // ---------- RESET ----------
    function resetar() {
      if (confirm('Tem certeza? Isso apagará TODAS as suas tarefas e redefinirá o aplicativo.')) {
        localStorage.removeItem(getStorageKey());
        localStorage.removeItem(STORAGE_USER_KEY);
        location.reload();
      }
    }

    // ---------- EVENT LISTENERS ----------
    addBtn.addEventListener('click', add);
    
    tituloInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        add();
      }
    });

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        mudarAba(btn.dataset.tab);
      });
    });

    // ---------- INTEGRAÇÃO COM SERVICE WORKER (LEMBRETES) ----------
    let intervaloContagem = null;

    function iniciarComunicacaoSW() {
      if (!('serviceWorker' in navigator)) return;
      
      navigator.serviceWorker.ready.then(registration => {
        if (!registration.active) return;

        // Inicia o intervalo de verificação no SW
        registration.active.postMessage({ type: 'START_REMINDERS' });

        // Função para enviar contagem de tarefas pendentes
        const enviarContagem = () => {
          if (!registration.active) return;
          const pendentes = tarefas.filter(t => t.status === 'pendente').length;
          registration.active.postMessage({
            type: 'TASKS_COUNT_RESPONSE',
            pendentes
          });
        };

        enviarContagem();
        intervaloContagem = setInterval(enviarContagem, 30000); // a cada 30s

        // Listener para pedidos de contagem vindos do SW
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data && event.data.type === 'GET_TASKS_COUNT') {
            const pendentes = tarefas.filter(t => t.status === 'pendente').length;
            registration.active.postMessage({
              type: 'TASKS_COUNT_RESPONSE',
              pendentes
            });
          }
        });
      }).catch(err => console.warn('SW não está pronto:', err));
    }

    function pararComunicacaoSW() {
      if (intervaloContagem) {
        clearInterval(intervaloContagem);
        intervaloContagem = null;
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(reg => {
          if (reg.active) reg.active.postMessage({ type: 'STOP_REMINDERS' });
        });
      }
    }

    // ---------- SERVICE WORKER (REGISTRO) ----------
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => {
          console.log('Service Worker registrado:', reg.scope);
          iniciarComunicacaoSW();
        })
        .catch(err => console.warn('Falha no registro do SW:', err));
    }

    window.addEventListener('beforeunload', pararComunicacaoSW);

    // ---------- INICIALIZAÇÃO ----------
    const hoje = new Date().toISOString().split('T')[0];
    dataInput.value = hoje;

    render();

    // Expor funções globais (compatibilidade)
    window.add = add;
    window.mudarAba = mudarAba;
    window.concluir = concluir;
    window.arquivar = arquivar;
    window.del = del;
    window.notif = notif;
    window.resetar = resetar;
    window.render = render;
  })();
</script>
</body>
  </html>
